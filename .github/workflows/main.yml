name: Generate stats card

on:
  schedule: # execute every 12 hours
    - cron: "* */12 * * *"

  workflow_dispatch:

  push:
    branches:
    - master

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: generate stats.svg
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&hide_title=false&hide_rank=false&show_icons=true&include_all_commits=true&count_private=true&disable_animations=false&theme=dark&locale=pt-br&hide_border=false
          path: dist/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}


      - name: push stats.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: stats-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
####

name: generate arcade contribution graphs

on:
    schedule: # Run automatically every 24 hours
        - cron: '0 0 * * *'
    workflow_dispatch: # Allows manual triggering
    push: # Runs on every push to the main branch
        branches:
            - main

jobs:
    generate:
        permissions:
            contents: write
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: generate contribution graph SVGs
              uses: abozanona/pacman-contribution-graph@main
              with:
                  github_user_name: ${{ github.repository_owner }}
                  # Comma-separated list of games to generate.
                  # Valid values: pacman, breakout, galaga, puzzle-bobble, bomberman
                  # Default: pacman
                  games: 'pacman,breakout,galaga,puzzle-bobble,bomberman'

            # Push the generated SVGs to the output branch
            - name: push SVGs to the output branch
              uses: crazy-max/ghaction-github-pages@v3.1.0
              with:
                  target_branch: output
                  build_dir: dist
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
